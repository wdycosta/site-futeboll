<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futebol</title>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial;
    padding:20px;
    margin:0;
}

h1{
    text-align:center;
}

#jogos{
    display:grid;
    gap:15px;
    max-width:900px;
    margin:0 auto;
}

.card{
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
}

.card h2{
    margin-top:0;
}

.message{
    text-align:center;
    color:#ddd;
}
</style>
</head>
<body>

<h1>Jogos do Dia</h1>

<div id="jogos" aria-live="polite">
    <h2 class="message">Carregando jogos...</h2>
</div>

<script>
const COMPETITION_CODES = new Set([
    "BSA",
    "BSB",
    "CBR",
    "CLI",
    "CSA",
    "LIB",
    "SUD",
]);

const COMPETITION_TERMS = [
    "brasileiro",
    "brasileirao",
    "copa do brasil",
    "conmebol",
    "libertadores",
    "sudamericana",
    "sul-americana",
    "recopa sudamericana",
];

function normalizeText(value = "") {
    return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
}

function isBrazilianOrSouthAmericanMatch(jogo) {
    const competition = jogo.competition || {};
    const competitionCode = String(competition.code || "")
        .trim()
        .toUpperCase();
    const competitionName = normalizeText(competition.name);

    return (
        COMPETITION_CODES.has(competitionCode) ||
        COMPETITION_TERMS.some(term => competitionName.includes(term))
    );
}

function formatDate(value) {
    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
        return "Data nao informada";
    }

    return date.toLocaleString("pt-BR", {
        dateStyle: "short",
        timeStyle: "short",
    });
}

function renderMessage(message) {
    const jogos = document.getElementById("jogos");
    jogos.innerHTML = "";

    const title = document.createElement("h2");
    title.className = "message";
    title.textContent = message;
    jogos.appendChild(title);
}

function createParagraph(label, value) {
    const paragraph = document.createElement("p");
    paragraph.textContent = `${label}: ${value || "Nao informado"}`;

    return paragraph;
}

function renderMatch(jogo) {
    const card = document.createElement("article");
    card.className = "card";

    const title = document.createElement("h2");
    title.textContent = `${jogo.homeTeam?.name || "Time mandante"} x ${jogo.awayTeam?.name || "Time visitante"}`;

    card.appendChild(title);
    card.appendChild(createParagraph("Competicao", jogo.competition?.name));
    card.appendChild(createParagraph("Horario", formatDate(jogo.utcDate)));
    card.appendChild(createParagraph("Status", jogo.status));

    return card;
}

fetch("/.netlify/functions/jogos")
.then(async res => {
    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
        throw new Error(data.message || "Erro ao carregar os jogos.");
    }

    return data;
})
.then(data => {
    console.log(data.matches.map(jogo => ({
    code: jogo.competition?.code,
    nome: jogo.competition?.name
})));
    const jogos = document.getElementById("jogos");
    const matches = Array.isArray(data.matches)
    ? data.matches
    : [];

    jogos.innerHTML = "";

    if (!matches.length) {
        renderMessage("Nenhum jogo brasileiro ou sul-americano encontrado.");
        return;
    }

    matches.forEach(jogo => {
        jogos.appendChild(renderMatch(jogo));
    });

})
.catch(erro => {

    console.error(erro);
    renderMessage("Erro ao carregar os jogos.");

});
</script>

</body>
</html>
